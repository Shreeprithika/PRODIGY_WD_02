<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chronos - Dark Time Utilities</title>
    <meta name="description" content="A premium and interactive dark-themed web-based stopwatch and timer application.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="mesh-bg">
        <div class="mesh-blob blob-1"></div>
        <div class="mesh-blob blob-2"></div>
        <div class="mesh-blob blob-3"></div>
    </div>

    <!-- Navigation -->
    <nav class="navbar glass-effect">
        <div class="nav-brand">
            <svg class="brand-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            <span class="brand-text">Chronos</span>
        </div>
        <div class="nav-links">
            <button class="nav-btn active" data-target="stopwatch">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                <span class="nav-text">Stop Watch</span>
            </button>
            <button class="nav-btn" data-target="timer">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 2h4"/><path d="m21 21-3-3"/><path d="M14 6v4"/><path d="M12 20a8 8 0 1 0 0-16 8 8 0 0 0 0 16Z"/></svg>
                <span class="nav-text">Timer</span>
            </button>
        </div>
    </nav>

    <main class="app-wrapper">
        
        <!-- STOP WATCH SECTION -->
        <section id="stopwatch" class="app-section active-section">
            <div class="split-layout">
                
                <!-- Left Box: Chrono Dial & Controls -->
                <div class="split-box glass-effect">
                    <div class="section-header">
                        <h1 class="title">Stop Watch</h1>
                    </div>
                    
                    <div class="display-container">
                        <div class="time-ring"></div>
                        <div class="time-text">
                            <span id="minutes">00</span><span class="colon">:</span><span id="seconds">00</span><span class="milliseconds" id="milliseconds">.00</span>
                        </div>
                    </div>

                    <div class="controls flex-gap">
                        <button id="lapBtn" class="btn btn-secondary action-btn" aria-label="Lap time" disabled>
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                        </button>
                        <button id="startStopBtn" class="btn btn-primary btn-start main-action-btn" aria-label="Start stopwatch">
                            <svg id="startIcon" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                            <svg id="pauseIcon" style="display: none;" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" stroke="none"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
                        </button>
                        <button id="resetBtn" class="btn btn-secondary action-btn" aria-label="Reset stopwatch">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                        </button>
                    </div>
                    
                    <div class="shortcuts-hint">
                        <span><span class="shortcut-key">Space</span> Start/Stop</span>
                        <span><span class="shortcut-key">L</span> Lap</span>
                        <span><span class="shortcut-key">R</span> Reset</span>
                    </div>
                </div>

                <!-- Right Box: Laps Table -->
                <div class="split-box glass-effect flex-col">
                    <div class="laps-header">
                        <h2 class="title">Lap Times</h2>
                        <button id="exportBtn" class="btn-icon" aria-label="Export Laps" title="Download Laps (CSV)" disabled>
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        </button>
                    </div>
                    <div class="laps-scroll-area">
                        <ul id="lapsList" class="laps-list">
                            <!-- Laps visually injected here -->
                            <div class="empty-state">No laps recorded yet</div>
                        </ul>
                    </div>
                </div>
            </div>
        </section>

        <!-- TIMER SECTION -->
        <section id="timer" class="app-section glass-effect" style="display: none; max-width: 480px; margin: 0 auto;">
            <div class="section-header">
                <h1 class="title">Timer</h1>
            </div>
            
            <div class="timer-presets-container">
                <button class="timer-preset-btn" data-sec="600">10 Min</button>
                <button class="timer-preset-btn" data-sec="1800">30 Min</button>
                <button class="timer-preset-btn" data-sec="3600">1 Hour</button>
            </div>

            <div class="display-container margin-top-lg">
                <svg class="timer-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="48" class="timer-bg-circle"></circle>
                    <circle cx="50" cy="50" r="48" class="timer-progress-circle" id="timerProgress"></circle>
                </svg>
                
                <div class="timer-input-group" id="timerInputGroup">
                    <div class="input-col">
                        <input type="number" id="inputHours" min="0" max="99" value="00" class="time-input">
                        <span class="input-label">h</span>
                    </div>
                    <span class="colon">:</span>
                    <div class="input-col">
                        <input type="number" id="inputMinutes" min="0" max="59" value="10" class="time-input">
                        <span class="input-label">m</span>
                    </div>
                    <span class="colon">:</span>
                    <div class="input-col">
                        <input type="number" id="inputSeconds" min="0" max="59" value="00" class="time-input">
                        <span class="input-label">s</span>
                    </div>
                </div>

                <div class="timer-countdown timer-countdown-hidden" id="timerCountdown">
                    <span id="tHours">00</span><span class="colon">:</span><span id="tMinutes">10</span><span class="colon">:</span><span id="tSeconds">00</span>
                </div>
            </div>

            <div class="controls flex-gap">
                <button class="btn btn-secondary action-btn invisible-placeholder" aria-label="Spacer" disabled></button>
                <button id="timerStartStopBtn" class="btn btn-primary btn-start main-action-btn" aria-label="Start Timer">
                    <svg id="t-startIcon" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                    <svg id="t-pauseIcon" style="display: none;" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" stroke="none"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
                </button>
                <button id="timerResetBtn" class="btn btn-secondary action-btn" aria-label="Reset Timer">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                </button>
            </div>
            
            <p class="instruction-text">Tap the numbers to set custom time or use the quick presets above.</p>
        </section>
    </main>

    <!-- Modal Popup for Timer Completion -->
    <div id="alarmModal" class="modal-overlay hidden">
        <div class="modal-content glass-effect">
            <div class="ringing-bell">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="bell-icon"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
            </div>
            <h2>Time's Up!</h2>
            <p>Your timer has finished successfully.</p>
            <button id="closeModalBtn" class="modal-btn">Dismiss</button>
        </div>
    </div>

    <!-- Audio for Timer Alarm -->
    <audio id="alarmSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script src="script.js"></script>
</body>
</html>
